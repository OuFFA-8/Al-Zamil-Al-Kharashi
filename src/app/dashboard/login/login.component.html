<div class="login-page">
  <div class="login-card">
    <div class="logo-wrap">
      <img src="/images/new-white-logo.png" alt="ZK Legal" class="logo-img" />
    </div>

    <div class="gold-divider"></div>

    <h1 class="card-title">تسجيل الدخول</h1>
    <p class="card-sub">أدخل بياناتك للمتابعة</p>

    <div *ngIf="error" class="error-alert">
      <i class="fas fa-exclamation-circle"></i>
      {{ error }}
    </div>

    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input
        type="email"
        [(ngModel)]="credentials.email"
        placeholder="admin@zklegal.com"
        (keyup.enter)="login()"
      />
    </div>

    <div class="form-group">
      <label>كلمة المرور</label>
      <div class="password-wrap">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="credentials.password"
          placeholder="••••••••"
          (keyup.enter)="login()"
        />
        <button
          class="eye-btn"
          (click)="showPassword = !showPassword"
          type="button"
        >
          @if (!showPassword) {
            <i class="fas fa-eye"></i>
          } @else {
            <i class="fas fa-eye-slash"></i>
          }
        </button>
      </div>
    </div>

    <button class="btn-login" (click)="login()" [disabled]="loading">
      @if (!loading) {
        <span>دخول</span>
      } @else {
        <span class="spinner"></span>
      }
    </button>

    <a routerLink="/home" class="back-link">
      <i class="fas fa-arrow-right"></i>
      العودة للموقع
    </a>
  </div>
</div>
