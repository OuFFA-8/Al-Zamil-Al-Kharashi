<header class="dash-header">
  <div class="breadcrumb">
    <span class="bc-root">Dashboard</span>
    <svg
      *ngIf="breadcrumb"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <polyline points="9 18 15 12 9 6" />
    </svg>
    <span *ngIf="breadcrumb" class="bc-current">{{ breadcrumb }}</span>
  </div>

  <div class="header-right">
    <div class="lang-switcher">
      <button
        class="lang-btn"
        [class.active]="currentLang === 'ar'"
        (click)="switchLang('ar')"
      >
        AR
      </button>
      <span class="lang-divider">|</span>
      <button
        class="lang-btn"
        [class.active]="currentLang === 'en'"
        (click)="switchLang('en')"
      >
        EN
      </button>
    </div>

    <!-- User Badge -->
    <div class="user-badge">
      <div class="user-avatar">{{ userInitials }}</div>
      <span class="user-name">{{ currentUser.name }}</span>
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </div>
  </div>
</header>
