<header class="dash-header">
  <div class="breadcrumb">
    <span class="bc-root">Dashboard</span>
    @if (breadcrumb) {
      <i class="fas fa-chevron-right" style="font-size: 11px; color: #ccc"></i>
      <span class="bc-current">{{ breadcrumb }}</span>
    }
  </div>

  <div class="header-right">
    <!-- Lang Toggle -->
    <button
      class="lang-toggle"
      (click)="switchLang(currentLang === 'ar' ? 'en' : 'ar')"
    >
      <span class="lang-indicator" [class.active]="currentLang === 'ar'"
        >AR</span
      >
      <span class="lang-divider"></span>
      <span class="lang-indicator" [class.active]="currentLang === 'en'"
        >EN</span
      >
    </button>

    <!-- User Dropdown -->
    <div class="user-wrap">
      <div class="user-badge" (click)="dropdownOpen = !dropdownOpen">
        <div class="user-avatar">{{ userInitials }}</div>
        <span class="user-name">{{ currentUser.name }}</span>
        <i class="fas fa-chevron-down chevron" [class.open]="dropdownOpen"></i>
      </div>

      @if (dropdownOpen) {
        <div class="dropdown">
          <div class="dd-header">
            <p class="dd-name">{{ currentUser.name }}</p>
            <p class="dd-role">Admin</p>
          </div>
          <div class="dd-divider"></div>
          <button
            class="dd-item danger"
            (click)="logout(); dropdownOpen = false"
          >
            <i class="fas fa-sign-out-alt"></i>
            تسجيل الخروج
          </button>
        </div>
      }
    </div>
  </div>
</header>
