<header class="dash-header">
  <div class="breadcrumb">
    <span class="bc-root">Dashboard</span>
    <svg
      *ngIf="breadcrumb"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <polyline points="9 18 15 12 9 6" />
    </svg>
    <span *ngIf="breadcrumb" class="bc-current">{{ breadcrumb }}</span>
  </div>

  <div class="header-right">
    <!-- Lang Toggle -->
    <button
      class="lang-toggle"
      (click)="switchLang(currentLang === 'ar' ? 'en' : 'ar')"
    >
      <span class="lang-indicator" [class.active]="currentLang === 'ar'"
        >AR</span
      >
      <span class="lang-divider"></span>
      <span class="lang-indicator" [class.active]="currentLang === 'en'"
        >EN</span
      >
    </button>

    <!-- User Dropdown -->
    <div class="user-wrap">
      <div class="user-badge" (click)="dropdownOpen = !dropdownOpen">
        <div class="user-avatar">{{ userInitials }}</div>
        <span class="user-name">{{ currentUser.name }}</span>
        <svg
          class="chevron"
          [class.open]="dropdownOpen"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>

      @if (dropdownOpen) {
        <div class="dropdown">
          <div class="dd-header">
            <p class="dd-name">{{ currentUser.name }}</p>
            <p class="dd-role">Admin</p>
          </div>
          <div class="dd-divider"></div>
          <button
            class="dd-item danger"
            (click)="logout(); dropdownOpen = false"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            تسجيل الخروج
          </button>
        </div>
      }
    </div>
  </div>
</header>
