<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-logo">
    @if (!collapsed) {
      <img src="/images/new-white-logo.png" alt="ZK Legal" class="logo-full" />
    } @else {
      <img
        src="/images/new-white-logo.png"
        alt="ZK Legal"
        class="logo-icon-only"
      />
    }
    <button class="collapse-btn" (click)="toggleCollapse.emit()">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path *ngIf="!collapsed" d="M15 18l-6-6 6-6" />
        <path *ngIf="collapsed" d="M9 18l6-6-6-6" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        [title]="collapsed ? (item.labelKey | translate) : ''"
      >
        <span class="nav-icon">
          <ng-container [ngSwitch]="item.icon">
            <svg
              *ngSwitchCase="'grid'"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
            <svg
              *ngSwitchCase="'users'"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <svg
              *ngSwitchCase="'calendar'"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <svg
              *ngSwitchCase="'mail'"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </ng-container>
        </span>
        <span class="nav-label" *ngIf="!collapsed">{{
          item.labelKey | translate
        }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button
      class="logout-btn"
      (click)="logout()"
      [title]="collapsed ? ('dashboard.nav.logout' | translate) : ''"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span *ngIf="!collapsed">{{ "dashboard.nav.logout" | translate }}</span>
    </button>
  </div>
</aside>
