<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-logo">
    @if (!collapsed) {
      <img src="/images/new-white-logo.png" alt="ZK Legal" class="logo-full" />
    } @else {
      <img
        src="/images/new-white-logo.png"
        alt="ZK Legal"
        class="logo-icon-only"
      />
    }
    <button class="collapse-btn" (click)="toggleCollapse.emit()">
      @if (!collapsed) {
        <i class="fas fa-chevron-left"></i>
      } @else {
        <i class="fas fa-chevron-right"></i>
      }
    </button>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        [title]="collapsed ? (item.labelKey | translate) : ''"
      >
        <span class="nav-icon">
          @switch (item.icon) {
            @case ("grid") {
              <i class="fas fa-th-large"></i>
            }
            @case ("users") {
              <i class="fas fa-users"></i>
            }
            @case ("calendar") {
              <i class="fas fa-newspaper"></i>
            }
            @case ("mail") {
              <i class="fas fa-envelope"></i>
            }
            @default {
              <i class="fas fa-circle"></i>
            }
          }
        </span>
        @if (!collapsed) {
          <span class="nav-label">{{ item.labelKey | translate }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button
      class="logout-btn"
      (click)="logout()"
      [title]="collapsed ? ('dashboard.nav.logout' | translate) : ''"
    >
      <i class="fas fa-sign-out-alt"></i>
      @if (!collapsed) {
        <span>{{ "dashboard.nav.logout" | translate }}</span>
      }
    </button>
  </div>
</aside>
